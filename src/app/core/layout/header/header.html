<header class="header">
  <h1 class="header-brand">
    <a routerLink="/" class="brand-link">
      <img src="/ensignalogoneg.png" alt="Librería Ensigna" class="brand-logo">
    </a>
  </h1>

  @if (!isLoginPage()) {
    <div class="header-buttons">

      @if (auth.isLoggedIn()) {
        <span class="welcome">Hola, {{ auth.currentUser()?.username }}</span>
      }

      @if (auth.isAdmin()) {
        <span class="role-badge admin">Admin</span>
      } @else if (auth.isUser()) {
        <span class="role-badge user">Usuario</span>
      }

      @if (auth.isAdmin()) {
        <button class="new-book-btn" (click)="goToNewBook()">
          Dar de alta
        </button>
      }

      @if (auth.isLoggedIn()) {

        <button class="orders-btn" (click)="goToOrders()">
          Mis pedidos
        </button>

        <button class="cart-btn" (click)="toggleCart()">
          Carrito ({{ totalItems() }})
        </button>

        <button class="logout-btn" (click)="logout()">
          Cerrar sesión
        </button>

      } @else {
        <button class="login-btn" (click)="goToLogin()">
          Iniciar sesión
        </button>
      }

    </div>
  }
</header>
