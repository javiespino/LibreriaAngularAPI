<div class="login-container">
  <div class="login-card">
    <h2>Identificarse</h2>
    
    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-field">
        <input placeholder="Usuario" formControlName="username">
      </div>
      
      <div class="password-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" placeholder="Contraseña" formControlName="password">
        <span class="toggle-eye" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁️' }}
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>

      @if (error()) {
        <p class="error-msg">Credenciales incorrectas</p>
      }
    </form>

    <div class="guest-divider">
      <span>o</span>
    </div>

    <button class="guest-btn" (click)="enterAsGuest()">
      Entrar como invitado
    </button>

    <div class="guest-divider">
      <span>o</span>
    </div>

    <a routerLink="/register" class="register-link">
      <button class="guest-btn">¿No tienes cuenta? Regístrate</button>
    </a>
  </div>
</div>
